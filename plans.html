<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>GetPhysIQ — My Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transpahrent;}
:root{
  --bg:#07070b;--s1:#0d0d12;--s2:#13131a;--s3:#1a1a24;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.04);
  --blue:#5b8af0;--violet:#8b5cf6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--cyan:#06b6d4;
  --txt:#f2f2f8;--muted:#737380;--dim:#3a3a46;
}
html,body{background:var(--bg);color:var(--txt);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ── Loading ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--s3);border-top:3px solid var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted);}

/* ── Error ── */
#error{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center;}
.error-icon{font-size:48px;}
.error-title{font-size:20px;font-weight:800;}
.error-msg{font-size:13px;color:var(--muted);max-width:300px;line-height:1.7;}
/* ── Login section ── */
#login-section{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-card{background:var(--surface2,#13131a);border:1px solid var(--bdr2,#2a2a3a);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;align-items:center;}
.login-logo{font-size:40px;}
.login-title{font-size:20px;font-weight:800;color:var(--fg,#fff);text-align:center;}
.login-sub{font-size:13px;color:var(--muted,#8b8b9e);text-align:center;line-height:1.6;max-width:260px;}
.login-input{width:100%;background:var(--surface,#0d0d14);border:1px solid var(--bdr,#1e1e2e);border-radius:10px;padding:13px 16px;color:var(--fg,#fff);font-size:14px;outline:none;box-sizing:border-box;}
.login-input:focus{border-color:#7b61ff;}
.login-btn{width:100%;background:linear-gradient(135deg,#7b61ff,#a78bfa);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-btn:disabled{opacity:.5;cursor:default;}
.login-error-msg{font-size:13px;color:#f87171;text-align:center;min-height:18px;}


/* ── App wrapper ── */
#app{display:none;max-width:430px;margin:0 auto;min-height:100vh;position:relative;}

/* ── Top bar ── */
.topbar{position:sticky;top:0;background:rgba(7,7,11,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr2);padding:env(safe-area-inset-top,14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
.logo{font-size:1.15rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.45));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.plan-badge-top{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);background:rgba(91,138,240,.1);border:1px solid rgba(91,138,240,.2);border-radius:99px;padding:3px 10px;}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;color:#fff;position:relative;}

/* ── Member hero ── */
.member-hero{padding:24px 20px 16px;border-bottom:1px solid var(--bdr2);}
.member-greeting{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;line-height:1.15;}
.member-greeting span{background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.member-meta{font-size:.78rem;color:var(--muted);}

/* ── Tab bar ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr2);background:var(--bg);position:sticky;top:62px;z-index:90;}
.tab{flex:1;padding:13px 4px;border:none;background:transparent;color:var(--muted);font-size:.72rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .18s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* ── Content ── */
.tab-content{padding:20px 20px 100px;}

/* ── Week grid ── */
.week-grid{display:flex;flex-direction:column;gap:10px;}
.day-card{background:var(--s1);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden;}
.day-card.rest{background:rgba(91,138,240,.03);border-style:dashed;}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;}
.day-label{font-size:.88rem;font-weight:800;letter-spacing:-.01em;}
.day-meta{display:flex;align-items:center;gap:8px;}
.day-focus{font-size:.72rem;color:var(--muted);font-weight:600;}
.day-dur{font-size:.7rem;color:var(--blue);font-weight:700;background:rgba(91,138,240,.1);padding:2px 8px;border-radius:99px;}
.day-done{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:.6rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.day-done.checked{background:var(--green);border-color:var(--green);color:#fff;}
.day-chevron{font-size:.65rem;color:var(--dim);transition:transform .2s;}
.day-chevron.open{transform:rotate(180deg);}
.exercises{padding:0 16px 14px;display:flex;flex-direction:column;gap:0;}
.exercise-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr2);font-size:.82rem;}
.exercise-row:last-child{border-bottom:none;}
.ex-name{font-weight:600;color:var(--txt);}
.ex-bw{font-size:.6rem;color:var(--muted);background:var(--s3);padding:1px 5px;border-radius:4px;margin-left:5px;}
.ex-details{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:.76rem;white-space:nowrap;}
.ex-sets{color:var(--blue);font-weight:700;}
.rest-label{text-align:center;padding:16px;font-size:.82rem;color:var(--muted);font-weight:600;}

/* ── Macros bar ── */
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.macro-card{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:12px 8px;text-align:center;}
.macro-val{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
.macro-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-top:2px;}
.macro-note{background:rgba(91,138,240,.06);border:1px solid rgba(91,138,240,.12);border-radius:10px;padding:12px 14px;font-size:.78rem;color:var(--muted);line-height:1.6;margin-bottom:16px;}

/* ── Meals ── */
.meals-list{display:flex;flex-direction:column;gap:10px;}
.meal-card{background:var(--s1);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden;}
.meal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;}
.meal-time-wrap{display:flex;align-items:center;gap:10px;}
.meal-emoji{font-size:1.3rem;}
.meal-name{font-size:.88rem;font-weight:700;}
.meal-time{font-size:.7rem;color:var(--muted);}
.meal-kcal{font-size:.72rem;font-weight:700;color:var(--amber);background:rgba(245,158,11,.1);padding:2px 8px;border-radius:99px;}
.meal-foods{padding:0 16px 14px;display:flex;flex-direction:column;gap:0;}
.food-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr2);font-size:.8rem;}
.food-row:last-child{border-bottom:none;}
.food-name{font-weight:500;color:var(--txt);}
.food-amount{font-size:.72rem;color:var(--muted);}
.food-macros{display:flex;gap:6px;font-size:.68rem;color:var(--dim);}
.food-macros span{color:var(--muted);}

/* ── Recipe ── */
.recipe-toggle{display:flex;align-items:center;gap:6px;padding:10px 16px;border-top:1px solid var(--bdr2);font-size:.75rem;font-weight:700;color:var(--blue);cursor:pointer;background:rgba(91,138,240,.04);}
.recipe-body{padding:14px 16px;border-top:1px solid var(--bdr2);background:var(--s2);}
.recipe-title{font-size:.85rem;font-weight:800;margin-bottom:4px;}
.recipe-meta{font-size:.7rem;color:var(--muted);margin-bottom:10px;display:flex;gap:10px;}
.recipe-section{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:8px 0 5px;}
.recipe-list{font-size:.78rem;color:var(--txt);line-height:1.7;list-style:none;}
.recipe-list li::before{content:'• ';color:var(--blue);}

/* ── Weekly strategy ── */
.strategy-card{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.15);border-radius:12px;padding:14px 16px;font-size:.82rem;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.strategy-card strong{color:var(--green);}

/* ── Tips ── */
.tips-list{display:flex;flex-direction:column;gap:10px;}
.tip-card{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.tip-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;}
.tip-text{font-size:.82rem;color:var(--muted);line-height:1.6;}

/* ── Section header ── */
.section-hd{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}

/* ── Regen button ── */
.regen-wrap{margin-bottom:20px;}
.regen-btn{width:100%;padding:15px;background:var(--s1);border:1.5px solid var(--bdr);border-radius:50px;color:var(--txt);font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;}
.regen-btn:hover{border-color:var(--blue);color:var(--blue);}
.regen-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Account tab ── */
.account-section{background:var(--s1);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.account-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr2);font-size:.88rem;}
.account-row:last-child{border-bottom:none;}
.account-label{color:var(--muted);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.account-val{font-weight:600;font-size:.88rem;}
.logout-btn{width:100%;padding:15px;background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.2);border-radius:50px;color:var(--red);font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:all .18s;}
.logout-btn:hover{background:rgba(239,68,68,.14);}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--bdr);border-radius:50px;padding:10px 20px;font-size:.82rem;font-weight:600;display:none;align-items:center;gap:8px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{display:flex;}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,7,11,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bdr2);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;border:none;background:transparent;font-family:'Sora',sans-serif;transition:color .15s;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--blue);}

/* ── Exercise interactive ── */
.exercise-row{flex-direction:column;gap:6px;align-items:stretch;}
.ex-main{display:flex;justify-content:space-between;align-items:center;width:100%;}
.ex-start-btn{margin-top:4px;width:100%;padding:9px;border-radius:9px;border:none;background:linear-gradient(135deg,#7b61ff,#a78bfa);color:#fff;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;}
.ex-action-row{display:flex;justify-content:space-between;align-items:center;background:rgba(123,97,255,.12);border-radius:9px;padding:8px 12px;}
.ex-set-progress{font-size:12px;font-weight:700;color:#a78bfa;}
.ex-done-btn{padding:7px 16px;border-radius:8px;border:none;background:#7b61ff;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.ex-rest-row{display:flex;align-items:center;gap:10px;background:rgba(16,185,129,.1);border-radius:9px;padding:8px 12px;}
.ex-rest-label{font-size:12px;color:#6ee7b7;font-weight:600;}
.ex-timer{font-size:22px;font-weight:800;color:#10b981;flex:1;text-align:center;}
.ex-skip-btn{padding:5px 12px;border-radius:7px;border:1px solid #10b981;background:transparent;color:#10b981;font-size:11px;cursor:pointer;}
.ex-complete-row{display:flex;align-items:center;justify-content:space-between;background:rgba(16,185,129,.1);border-radius:9px;padding:8px 12px;}
.ex-complete-label{font-size:12px;font-weight:700;color:#10b981;}
.ex-reset-btn{padding:4px 10px;border-radius:7px;border:1px solid #374151;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;}
</style>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading your plan…</div>
</div>

<div id="error">
  <div class="error-icon">⚠️</div>
  <div class="error-title">Plan not found</div>
  <div class="error-msg" id="error-msg">This link may have expired or is invalid.<br>Contact us at <strong>support@getphysiq.fit</strong></div>
</div>

<div id="login-section">
  <div class="login-card">
    <div class="login-logo">💪</div>
    <div class="login-title">Access Your Plan</div>
    <div class="login-sub">Enter the email and password from your welcome email</div>
    <input id="login-email" class="login-input" type="email" placeholder="Email address" autocomplete="email" />
    <input id="login-password" class="login-input" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="login-btn" class="login-btn" onclick="handleLogin()">View My Plan →</button>
    <div id="login-error-msg" class="login-error-msg"></div>
  </div>
</div>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── SET YOUR DEPLOYED BACKEND URL HERE ────────────────────────
const API_BASE = 'https://web-production-c136a.up.railway.app';
const fetchWithRetry = async (url, options = {}, retries = 8, delay = 4000) => {
  // no-cors warm-up ping: wakes Railway even though cold-start 503s have no CORS headers
  await Promise.race([
    fetch(API_BASE, { mode: 'no-cors' }).catch(() => {}),
    new Promise(r => setTimeout(r, 3000))
  ]);
  for (let i = 0; i < retries; i++) {
    try {
      const r = await fetch(url, options);
      if (r.status === 503 && i < retries - 1) { await new Promise(x => setTimeout(x, delay)); continue; }
      return r;
    } catch (e) {
      if (i < retries - 1) await new Promise(x => setTimeout(x, delay)); else throw e;
    }
  }
};

// Dev: const API_BASE = 'http://localhost:8000';
// ──────────────────────────────────────────────────────────────

function showToast(msg, emoji = '✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${emoji}</span> ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── WORKOUT TAB ─────────────────────────────────────────────

// ── EXERCISE ROW (interactive: start + rest timer) ──────────
function ExerciseRow({ ex }) {
  const [phase, setPhase] = React.useState('idle'); // idle | active | resting | done
  const [setNum, setSetNum] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(0);
  const timerRef = React.useRef(null);

  const totalSets  = parseInt(ex.sets) || 3;
  const restSecs   = parseInt(String(ex.rest).replace(/[^0-9]/g, '')) || 60;

  const startRest = (nextSet) => {
    setPhase('resting');
    setTimeLeft(restSecs);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timerRef.current); setPhase('active'); return 0; }
        return t - 1;
      });
    }, 1000);
    setSetNum(nextSet);
  };

  const handleStart   = () => { setPhase('active'); setSetNum(0); };
  const handleDoneSet = () => {
    clearInterval(timerRef.current);
    const next = setNum + 1;
    if (next >= totalSets) { setPhase('done'); setSetNum(next); }
    else startRest(next);
  };
  const handleSkip  = () => { clearInterval(timerRef.current); setPhase('active'); };
  const handleReset = () => { clearInterval(timerRef.current); setPhase('idle'); setSetNum(0); };

  return (
    <div className="exercise-row">
      <div className="ex-main">
        <span className="ex-name">
          {ex.name}{ex.isBW && <span className="ex-bw"> BW</span>}
        </span>
        <span className="ex-details">
          <span className="ex-sets">{ex.sets} × {ex.reps}</span>
          <span>{ex.rest}</span>
          {ex.weight > 0 && <span>{ex.weight}kg</span>}
        </span>
      </div>
      {phase === 'idle' && (
        <button className="ex-start-btn" onClick={handleStart}>▶ Start</button>
      )}
      {phase === 'active' && (
        <div className="ex-action-row">
          <span className="ex-set-progress">Set {setNum + 1} / {totalSets}</span>
          <button className="ex-done-btn" onClick={handleDoneSet}>Done ✓</button>
        </div>
      )}
      {phase === 'resting' && (
        <div className="ex-rest-row">
          <span className="ex-rest-label">Rest</span>
          <span className="ex-timer">{timeLeft}s</span>
          <button className="ex-skip-btn" onClick={handleSkip}>Skip</button>
        </div>
      )}
      {phase === 'done' && (
        <div className="ex-complete-row">
          <span className="ex-complete-label">✓ All {totalSets} sets done!</span>
          <button className="ex-reset-btn" onClick={handleReset}>↩ Reset</button>
        </div>
      )}
    </div>
  );
}

function WorkoutTab({ weekPlan, token, onRegen }) {
  const [open, setOpen]       = useState({});
  const [done, setDone]       = useState({});
  const [openRecipe, setOR]   = useState({});
  const [regen, setRegen]     = useState(false);

  const toggle = (i) => setOpen(p => ({ ...p, [i]: !p[i] }));
  const toggleDone = (i) => {
    setDone(p => ({ ...p, [i]: !p[i] }));
    showToast(done[i] ? 'Marked incomplete' : 'Day completed! 💪', done[i] ? '↩️' : '🔥');
  };

  const handleRegen = async () => {
    setRegen(true);
    showToast('Regenerating your plan…', '🤖');
    try {
      const res = await fetch('/api/regenerate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      if (!res.ok) throw new Error('Failed');
      showToast('New plan generated!', '✅');
      setTimeout(() => window.location.reload(), 1200);
    } catch {
      showToast('Regeneration failed. Try again.', '❌');
    } finally {
      setRegen(false);
    }
  };

  if (!weekPlan || !weekPlan.length) {
    return <div style={{ padding: 32, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>No workout plan available.</div>;
  }

  return (
    <div className="tab-content">
      <div className="regen-wrap">
        <button className="regen-btn" onClick={handleRegen} disabled={regen}>
          <span>🔄</span> {regen ? 'Regenerating…' : 'Regenerate Plan'}
        </button>
      </div>
      <div className="section-hd">Weekly Schedule</div>
      <div className="week-grid">
        {weekPlan.map((day, i) => (
          <div key={i} className={`day-card${day.rest ? ' rest' : ''}`}>
            {day.rest ? (
              <div className="rest-label">😴 {day.day} — Rest & Recovery</div>
            ) : (
              <>
                <div className="day-header" onClick={() => toggle(i)}>
                  <div>
                    <div className="day-label">{day.day}</div>
                    <div className="day-focus">{day.focus}</div>
                  </div>
                  <div className="day-meta">
                    {day.duration && <span className="day-dur">{day.duration}min</span>}
                    <div
                      className={`day-done${done[i] ? ' checked' : ''}`}
                      onClick={e => { e.stopPropagation(); toggleDone(i); }}
                    >{done[i] ? '✓' : ''}</div>
                    <span className={`day-chevron${open[i] ? ' open' : ''}`}>▼</span>
                  </div>
                </div>
                {open[i] && day.exercises && (
                  <div className="exercises">
                    {day.exercises.map((ex, j) => (
                      <ExerciseRow key={j} ex={ex} />
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── NUTRITION TAB ────────────────────────────────────────────
function NutritionTab({ macros, macroNote, meals, weeklyStrategy }) {
  const [open, setOpen]     = useState({});
  const [recipe, setRecipe] = useState({});

  if (!macros && !meals) {
    return <div style={{ padding: 32, textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>No nutrition plan available.</div>;
  }

  const totalMealKcal = (foods) => foods ? foods.reduce((s, f) => s + (f.kcal || 0), 0) : 0;

  return (
    <div className="tab-content">
      {macros && (
        <>
          <div className="section-hd" style={{ marginBottom: 10 }}>Daily Targets</div>
          <div className="macros-row">
            {[
              { val: macros.calories, lbl: 'kcal' },
              { val: `${macros.protein}g`, lbl: 'protein' },
              { val: `${macros.carbs}g`, lbl: 'carbs' },
              { val: `${macros.fat}g`, lbl: 'fats' },
            ].map((m, i) => (
              <div key={i} className="macro-card">
                <div className="macro-val">{m.val}</div>
                <div className="macro-lbl">{m.lbl}</div>
              </div>
            ))}
          </div>
          {macroNote && <div className="macro-note">{macroNote}</div>}
        </>
      )}

      {weeklyStrategy && (
        <div className="strategy-card"><strong>Weekly Strategy: </strong>{weeklyStrategy}</div>
      )}

      {meals && meals.length > 0 && (
        <>
          <div className="section-hd">Meal Plan</div>
          <div className="meals-list">
            {meals.map((meal, i) => (
              <div key={i} className="meal-card">
                <div className="meal-header" onClick={() => setOpen(p => ({ ...p, [i]: !p[i] }))}>
                  <div className="meal-time-wrap">
                    <span className="meal-emoji">{{'sunrise':'🌅','moon':'🌙','sun':'☀️','star':'⭐','lightning':'⚡','apple':'🍎','fire':'🔥','pizza':'🍕','salad':'🥗','chicken':'🍗','fish':'🐟','beef':'🥩','egg':'🥚','rice':'🍚','bread':'🍞','yogurt':'🥛','nuts':'🥜','banana':'🍌','berry':'🫐','protein':'💪','bowl':'🍜','grape':'🍇','orange':'🍊','avocado':'🥑','coffee':'☕','shake':'🥤'}[meal.emoji] || meal.emoji || '🍽️'}</span>
                    <div>
                      <div className="meal-name">{meal.label}</div>
                      <div className="meal-time">{meal.time}</div>
                    </div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span className="meal-kcal">{totalMealKcal(meal.foods)} kcal</span>
                    <span style={{ fontSize: '.65rem', color: 'var(--dim)' }}>{open[i] ? '▲' : '▼'}</span>
                  </div>
                </div>

                {open[i] && (
                  <>
                    <div className="meal-foods">
                      {(meal.foods || []).map((food, j) => (
                        <div key={j} className="food-row">
                          <div>
                            <div className="food-name">{food.name}</div>
                            <div className="food-amount">{food.amount}</div>
                          </div>
                          <div className="food-macros">
                            <span>{food.kcal}kcal</span>
                            {food.p != null && <span>{food.p}p</span>}
                            {food.c != null && <span>{food.c}c</span>}
                            {food.f != null && <span>{food.f}f</span>}
                          </div>
                        </div>
                      ))}
                    </div>

                    {meal.recipe && (
                      <>
                        <div className="recipe-toggle" onClick={() => setRecipe(p => ({ ...p, [i]: !p[i] }))}>
                          👨‍🍳 {recipe[i] ? 'Hide recipe' : 'View recipe'}
                        </div>
                        {recipe[i] && (
                          <div className="recipe-body">
                            <div className="recipe-title">{meal.recipe.title}</div>
                            <div className="recipe-meta">
                              <span>⏱ {meal.recipe.time}</span>
                              <span>📊 {meal.recipe.difficulty}</span>
                            </div>
                            {meal.recipe.ingredients && (
                              <>
                                <div className="recipe-section">Ingredients</div>
                                <ul className="recipe-list">
                                  {meal.recipe.ingredients.map((ing, k) => <li key={k}>{ing}</li>)}
                                </ul>
                              </>
                            )}
                            {meal.recipe.steps && (
                              <>
                                <div className="recipe-section" style={{ marginTop: 10 }}>Steps</div>
                                <ul className="recipe-list">
                                  {meal.recipe.steps.map((step, k) => <li key={k}>{step}</li>)}
                                </ul>
                              </>
                            )}
                          </div>
                        )}
                      </>
                    )}
                  </>
                )}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── TIPS TAB ─────────────────────────────────────────────────
function TipsTab({ tips }) {
  if (!tips || !tips.length) return null;
  return (
    <div className="tab-content">
      <div className="section-hd">Coaching Tips</div>
      <div className="tips-list">
        {tips.map((tip, i) => (
          <div key={i} className="tip-card">
            <div className="tip-num">{i + 1}</div>
            <div className="tip-text">{tip}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── ACCOUNT TAB ──────────────────────────────────────────────
function AccountTab({ data }) {
  const planLabels = {
    complete:  'Complete Plan (Workout + Nutrition)',
    fitness:   'Fitness Plan',
    nutrition: 'Nutrition Plan',
  };

  const rows = [
    { label: 'Name',       val: data.name },
    { label: 'Email',      val: data.email },
    { label: 'Plan',       val: planLabels[data.plan_type] || data.plan_type },
    { label: 'Goal',       val: data.goal },
    { label: 'Experience', val: data.experience },
    { label: 'Generated',  val: data.generatedAt || '—' },
  ];

  return (
    <div className="tab-content">
      <div className="section-hd">Your Profile</div>
      <div className="account-section">
        {rows.map((r, i) => r.val && (
          <div key={i} className="account-row">
            <span className="account-label">{r.label}</span>
            <span className="account-val">{r.val}</span>
          </div>
        ))}
      </div>
      <button className="logout-btn" onClick={() => {
        window.location.href = '/';
      }}>
        ← Back to Home
      </button>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────
function PlanApp({ planData, token }) {
  const hasWorkout   = planData.weekPlan  && planData.weekPlan.length > 0;
  const hasNutrition = planData.macros    || (planData.meals && planData.meals.length > 0);

  const defaultTab = hasWorkout ? 'workout' : hasNutrition ? 'nutrition' : 'tips';
  const [tab, setTab] = useState(defaultTab);

  const planType    = planData.plan_type || '';
  const memberName  = planData.name || 'Member';
  const firstName   = memberName.split(' ')[0];

  const planLabel = {
    complete:  'Complete Plan',
    fitness:   'Fitness Plan',
    nutrition: 'Nutrition Plan',
  }[planType] || 'My Plan';

  const tabs = [
    hasWorkout   && { id: 'workout',   icon: '💪', label: 'Workout' },
    hasNutrition && { id: 'nutrition', icon: '🥗', label: 'Nutrition' },
    planData.tips && planData.tips.length && { id: 'tips', icon: '💡', label: 'Tips' },
    { id: 'account', icon: '👤', label: 'Account' },
  ].filter(Boolean);

  return (
    <div>
      {/* Top bar */}
      <div className="topbar">
        <div className="logo">GetPhysIQ ⚡</div>
        <span className="plan-badge-top">{planLabel}</span>
        <div className="avatar-btn">{firstName.charAt(0).toUpperCase()}</div>
      </div>

      {/* Member hero */}
      <div className="member-hero">
        <div className="member-greeting">Hey, <span>{firstName}</span> 👋</div>
        <div className="member-meta">Your personalised plan is ready below.</div>
      </div>

      {/* Tab bar */}
      <div className="tabs">
        {tabs.map(t => (
          <button
            key={t.id}
            className={`tab${tab === t.id ? ' active' : ''}`}
            onClick={() => setTab(t.id)}
          >
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Tab content */}
      {tab === 'workout' && (
        <WorkoutTab
          weekPlan={planData.weekPlan}
          token={token}
        />
      )}
      {tab === 'nutrition' && (
        <NutritionTab
          macros={planData.macros}
          macroNote={planData.macroNote}
          meals={planData.meals}
          weeklyStrategy={planData.weeklyStrategy}
        />
      )}
      {tab === 'tips' && <TipsTab tips={planData.tips} />}
      {tab === 'account' && <AccountTab data={{ ...planData, generatedAt: planData.generatedAt }} />}

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {tabs.map(t => (
          <button
            key={t.id}
            className={`nav-item${tab === t.id ? ' active' : ''}`}
            onClick={() => setTab(t.id)}
          >
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── LOADER ───────────────────────────────────────────────────
function App() {
  const [plan,  setPlan]  = useState(null);
  const [token, setToken] = useState(null);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const tok    = params.get('token');

    if (!tok) {
      document.getElementById('loading').style.display       = 'none';
      document.getElementById('login-section').style.display = 'flex';
      return;
    }

    setToken(tok);

    // Timeout after 12 seconds so it never hangs forever
    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 90000);

    fetchWithRetry(`/api/plan?token=${encodeURIComponent(tok)}`, {})
      .then(res => {
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        // Merge top-level plan fields
        const merged = { ...data, ...(data.plan || {}) };
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display     = 'block';
        setPlan(merged);
      })
      .catch(err => {
        clearTimeout(timeoutId);
        const msg = err.name === 'AbortError'
          ? 'Request timed out. The server may not be reachable yet.'
          : `Could not load your plan (${err.message}).`;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display   = 'flex';
        document.getElementById('error-msg').innerHTML   =
          `${msg}<br>Contact <strong>support@getphysiq.fit</strong>`;
      });
  }, []);

  if (!plan) return null;
  return <PlanApp planData={plan} token={token} />;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
<script>
function handleLogin() {
  var email    = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn      = document.getElementById('login-btn');
  var errEl    = document.getElementById('login-error-msg');

  errEl.textContent = '';
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Loading…';

  fetch('/api/login?email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password))
    .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
    .then(function(res) {
      if (res.status === 200 && res.data.token) {
        window.location.href = '/plans.html?token=' + encodeURIComponent(res.data.token);
      } else {
        errEl.textContent = res.data.detail || res.data.error || 'Invalid email or password.';
        btn.disabled    = false;
        btn.textContent = 'View My Plan →';
      }
    })
    .catch(function() {
      errEl.textContent = 'Network error. Please try again.';
      btn.disabled    = false;
      btn.textContent = 'View My Plan →';
    });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-section').style.display === 'flex') {
    handleLogin();
  }
});
</script>
